<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alaska 2026 — Ken & Georgianna</title>
<script>
  // Theme init — runs before paint to avoid flash of wrong theme.
  (function() {
    try {
      var saved = localStorage.getItem('theme');
      var theme = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    } catch (e) {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  })();
  function toggleTheme() {
    var current = document.documentElement.getAttribute('data-theme') || 'light';
    var next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    try { localStorage.setItem('theme', next); } catch (e) {}
  }
</script>
<!--
  =============================================================
  VACATION TRACKER — Ken's reusable template
  =============================================================
  HOW TO USE THIS AS A TEMPLATE FOR FUTURE YEARS:
    1. Copy this file. Rename to e.g. "2027-trip.html".
    2. Edit the data block in <script id="trip-data" type="application/json">
       at the bottom of <body>. Change destination, dates, flights, hotels,
       and activities.
    3. The page renders entirely from that JSON block — no other HTML edits
       required. The CSS/layout stay the same year to year.
    4. Status values for each item: "todo" | "booked" | "confirmed" | "complete"
    5. Save the file. Open in a browser. Print to PDF if you want a hard copy.
  =============================================================
-->
<style>
  :root {
    /* Light theme — default */
    --scenic-image: url("https://upload.wikimedia.org/wikipedia/commons/1/1d/Mendenhall_River_Glacier-Tongass.jpg");
    --ink: #082033;
    --ink-soft: #294458;
    --muted: #6d7f8d;
    --line: rgba(22, 56, 70, 0.15);
    --section-line: rgba(8, 32, 51, 0.22);
    --bg: #e7f0ee;
    --card: rgba(255, 255, 255, 0.9);
    --card-soft: rgba(240, 246, 244, 0.88);
    --card-softer: rgba(249, 252, 250, 0.96);
    --accent: #1f6f8b;
    --glacier: #69b9cb;
    --gold: #b9903f;
    --green: #24795a;
    --amber: #b76612;
    --red: #b94032;
    --shadow: 0 18px 50px rgba(8, 32, 51, 0.12), 0 2px 8px rgba(8, 32, 51, 0.06);
    --glass: rgba(255, 255, 255, 0.76);
    --glass-strong: rgba(255, 255, 255, 0.9);
    --body-overlay:
      radial-gradient(circle at 15% 12%, rgba(105, 185, 203, 0.18), transparent 32%),
      linear-gradient(180deg, rgba(241, 247, 245, 0.76) 0%, rgba(250, 252, 251, 0.94) 42%, rgba(239, 246, 244, 0.98) 100%);
    --hero-overlay:
      linear-gradient(90deg, rgba(5, 21, 32, 0.58) 0%, rgba(5, 21, 32, 0.3) 52%, rgba(5, 21, 32, 0.08) 100%),
      linear-gradient(180deg, rgba(5, 21, 32, 0.04) 0%, rgba(5, 21, 32, 0.42) 100%);

    /* Hero — bright Alaska sky over snow */
    --hero-top: #4f9fd0;
    --hero-mid: #a4d2eb;
    --hero-bot: #e8f4fa;
    --mountain-far: #aab9d2;
    --mountain-mid: #6982ab;
    --mountain-near: #2d4870;
    --snow-tint: rgba(255, 255, 255, 0.92);
    --hero-text: #ffffff;
    --hero-text-muted: rgba(255,255,255,0.82);
    --hero-text-soft: rgba(255,255,255,0.62);
    --hero-divider: rgba(255,255,255,0.22);
    --aurora-1: transparent;
    --aurora-2: transparent;
  }

  [data-theme="dark"] {
    /* Dark theme — aurora over snowy peaks */
    --ink: #e8f1f5;
    --ink-soft: #b7c9d3;
    --muted: #8da1ad;
    --line: rgba(157, 198, 211, 0.18);
    --section-line: rgba(232, 241, 245, 0.2);
    --bg: #06121d;
    --card: rgba(8, 23, 36, 0.88);
    --card-soft: rgba(12, 36, 54, 0.86);
    --card-softer: rgba(11, 30, 45, 0.96);
    --accent: #7cc9df;
    --glacier: #a5dce9;
    --gold: #dfbe72;
    --green: #6dd0a4;
    --amber: #efa64d;
    --red: #f07666;
    --shadow: 0 18px 55px rgba(0, 0, 0, 0.42), 0 2px 8px rgba(0, 0, 0, 0.28);
    --glass: rgba(8, 23, 36, 0.7);
    --glass-strong: rgba(8, 23, 36, 0.9);
    --body-overlay:
      radial-gradient(circle at 15% 12%, rgba(71, 185, 153, 0.22), transparent 34%),
      linear-gradient(180deg, rgba(4, 10, 18, 0.82) 0%, rgba(6, 18, 29, 0.94) 48%, rgba(4, 10, 18, 0.98) 100%);
    --hero-overlay:
      linear-gradient(90deg, rgba(2, 8, 16, 0.84) 0%, rgba(2, 8, 16, 0.56) 54%, rgba(2, 8, 16, 0.18) 100%),
      linear-gradient(180deg, rgba(2, 8, 16, 0.16) 0%, rgba(2, 8, 16, 0.72) 100%);

    --hero-top: #040813;
    --hero-mid: #0a1834;
    --hero-bot: #1a2d4f;
    --mountain-far: #1a2c4d;
    --mountain-mid: #0c1d36;
    --mountain-near: #04091a;
    --snow-tint: rgba(195, 220, 240, 0.65);
    --hero-text: #eaf3ff;
    --hero-text-muted: rgba(234,243,255,0.72);
    --hero-text-soft: rgba(234,243,255,0.5);
    --hero-divider: rgba(234,243,255,0.12);
    --aurora-1: #2ecc8d;
    --aurora-2: #5e8bd8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html {
    background: var(--bg);
    max-width: 100%;
    overflow-x: hidden;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    background-image: var(--body-overlay), var(--scenic-image);
    background-size: cover, cover;
    background-position: center top, center top;
    background-attachment: fixed, fixed;
    color: var(--ink);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    transition: background-color 0.25s ease, color 0.25s ease;
    min-height: 100vh;
    max-width: 100%;
    overflow-x: hidden;
  }
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* ============== HERO ============== */
  .hero {
    position: relative;
    margin: 0 0 44px;
    background-image: var(--hero-overlay), var(--scenic-image);
    background-size: cover, cover;
    background-position: center, center 44%;
    overflow: hidden;
    color: var(--hero-text);
    border-radius: 0 0 28px 28px;
    box-shadow: 0 28px 70px rgba(8, 32, 51, 0.28);
    isolation: isolate;
    min-height: 520px;
  }
  .hero::after {
    content: "";
    position: absolute;
    inset: auto 0 0;
    height: 42%;
    background: linear-gradient(180deg, transparent 0%, rgba(5, 21, 32, 0.2) 55%, rgba(5, 21, 32, 0.48) 100%);
    z-index: 1;
    pointer-events: none;
  }
  .hero-inner {
    position: relative;
    width: 100%;
    max-width: 1100px;
    margin: 0 auto;
    padding: 72px 32px 92px;
    z-index: 3;
  }
  .hero-aurora {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 70%;
    pointer-events: none;
    z-index: 1;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  [data-theme="dark"] .hero-aurora {
    opacity: 0.85;
    animation: auroraDrift 22s ease-in-out infinite alternate;
  }
  @keyframes auroraDrift {
    0%   { transform: translate3d(-2%, 0, 0) scale(1.02); }
    100% { transform: translate3d(2%, -2%, 0) scale(1.06); }
  }
  .hero-mountains {
    display: none;
  }
  .hero-eyebrow {
    text-transform: uppercase;
    letter-spacing: 0.22em;
    font-size: 11px;
    color: var(--hero-text-soft);
    margin-bottom: 14px;
  }
  .hero-title {
    font-size: 54px;
    font-weight: 800;
    letter-spacing: 0;
    line-height: 1.05;
    margin-bottom: 12px;
    max-width: 720px;
    text-shadow: 0 4px 26px rgba(0,0,0,0.42);
  }
  .hero-subtitle {
    font-size: 18px;
    color: var(--hero-text-muted);
    margin-bottom: 30px;
    max-width: 640px;
    text-shadow: 0 2px 16px rgba(0,0,0,0.42);
  }
  .countdown-row {
    display: grid;
    grid-template-columns: repeat(4, minmax(130px, 1fr));
    gap: 10px;
    width: 100%;
    max-width: 780px;
  }
  .countdown-item {
    min-width: 0;
    background: rgba(255, 255, 255, 0.22);
    border: 1px solid rgba(255, 255, 255, 0.28);
    border-radius: 8px;
    padding: 13px 14px;
    backdrop-filter: blur(10px);
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
  }
  .countdown-item .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--hero-text-soft);
    margin-bottom: 4px;
  }
  .countdown-item .value {
    font-size: 21px;
    font-weight: 700;
    color: var(--hero-text);
    overflow-wrap: break-word;
  }

  /* Theme toggle button */
  .theme-toggle {
    position: absolute;
    top: 24px;
    right: 24px;
    z-index: 10;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.28);
    border-radius: 999px;
    color: var(--hero-text);
    padding: 8px 14px 8px 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    transition: background-color 0.18s ease, transform 0.18s ease, border-color 0.18s ease;
  }
  .theme-toggle:hover {
    background: rgba(255,255,255,0.28);
    border-color: rgba(255,255,255,0.45);
    transform: translateY(-1px);
  }
  [data-theme="dark"] .theme-toggle {
    background: rgba(20, 36, 66, 0.6);
    border-color: rgba(136, 206, 234, 0.35);
  }
  [data-theme="dark"] .theme-toggle:hover {
    background: rgba(20, 36, 66, 0.85);
    border-color: rgba(136, 206, 234, 0.65);
  }
  .theme-toggle svg { width: 14px; height: 14px; }
  .theme-toggle .icon-sun { display: inline-block; }
  .theme-toggle .icon-moon { display: none; }
  [data-theme="dark"] .theme-toggle .icon-sun { display: none; }
  [data-theme="dark"] .theme-toggle .icon-moon { display: inline-block; }

  @media (max-width: 640px) {
    body { background-attachment: scroll, scroll; }
    .hero { min-height: auto; margin-bottom: 30px; border-radius: 0 0 18px 18px; }
    .hero-inner { padding: 70px 24px 52px; }
    .hero-title { font-size: 29px; max-width: 300px; overflow-wrap: break-word; }
    .hero-subtitle { max-width: 320px; }
    .countdown-row { grid-template-columns: 1fr; gap: 8px; }
    .countdown-item { padding: 11px 12px; }
    .countdown-item .value { font-size: 18px; }
    .theme-toggle { top: 14px; right: 14px; }
    .theme-toggle .toggle-label { display: none; }
  }

  /* Sections */
  section { margin-bottom: 44px; }
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--section-line);
  }
  .section-title {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0;
  }
  .section-summary {
    font-size: 13px;
    color: var(--muted);
  }

  /* Cards */
  .cards { display: grid; gap: 14px; }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 18px 20px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(14px);
  }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 8px;
  }
  .card-name {
    font-size: 17px;
    font-weight: 600;
    color: var(--ink);
  }
  .card-sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 10px 24px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--line);
  }
  .field-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .field-value {
    font-size: 14px;
    color: var(--ink-soft);
    word-break: break-word;
  }
  .field-value.empty {
    color: var(--muted);
    opacity: 0.5;
    font-style: italic;
  }
  .field-value a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s;
  }
  .field-value a:hover { border-bottom-color: var(--accent); }
  .notes {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--line);
    font-size: 13px;
    color: var(--ink-soft);
    font-style: italic;
  }

  /* Status pills */
  .pill {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }
  .pill-todo { background: #fff1e8; color: var(--amber); border: 1px solid #ffd9c2; }
  .pill-pending { background: #ede9fe; color: #6d28d9; border: 1px solid #c4b5fd; }
  .pill-booked { background: #fef9d8; color: #b08400; border: 1px solid #f5e08c; }
  .pill-confirmed { background: #e3f5ea; color: var(--green); border: 1px solid #b8e0c8; }
  .pill-cancelled { background: #fef2f2; color: var(--red); border: 1px solid #fecaca; text-decoration: line-through; }
  .pill-complete { background: #e7eef5; color: var(--ink-soft); border: 1px solid #c8d4e2; }

  [data-theme="dark"] .pill-todo { background: rgba(245, 161, 66, 0.12); color: #f5b876; border-color: rgba(245, 161, 66, 0.32); }
  [data-theme="dark"] .pill-pending { background: rgba(149, 117, 215, 0.16); color: #c9b7ec; border-color: rgba(149, 117, 215, 0.34); }
  [data-theme="dark"] .pill-booked { background: rgba(212, 183, 106, 0.15); color: #f0d893; border-color: rgba(212, 183, 106, 0.32); }
  [data-theme="dark"] .pill-confirmed { background: rgba(76, 185, 138, 0.15); color: #86e7b3; border-color: rgba(76, 185, 138, 0.34); }
  [data-theme="dark"] .pill-cancelled { background: rgba(239, 94, 78, 0.14); color: #f3a59a; border-color: rgba(239, 94, 78, 0.32); text-decoration: line-through; }
  [data-theme="dark"] .pill-complete { background: rgba(122, 138, 159, 0.16); color: var(--ink-soft); border-color: rgba(122, 138, 159, 0.3); }

  /* Itinerary */
  #itinerary-list {
    background: var(--glass);
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(14px);
    overflow: hidden;
  }
  .day-row {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 20px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--line);
  }
  .day-row:last-child { border-bottom: none; }
  .day-date {
    font-weight: 600;
    color: var(--accent);
  }
  .day-date .dow {
    display: block;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 500;
  }
  .day-plan { color: var(--ink-soft); }
  .day-plan strong { color: var(--ink); }

  @media (max-width: 640px) {
    .container { padding: 0 16px 64px; }
    section { margin-bottom: 34px; }
    .section-header {
      display: block;
    }
    .section-title {
      font-size: 21px;
    }
    .section-summary {
      margin-top: 3px;
    }
    .card {
      padding: 16px;
    }
    .card-top {
      display: block;
    }
    .pill {
      margin-top: 8px;
    }
    .day-row {
      grid-template-columns: 1fr;
      gap: 6px;
      padding: 15px 16px;
    }
  }

  @media (max-width: 430px) {
    .countdown-row { grid-template-columns: 1fr; }
    .countdown-item .value { font-size: 17px; }
  }

  /* Budget */
  table.budget {
    width: 100%;
    border-collapse: collapse;
    background: var(--card);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: var(--shadow);
    backdrop-filter: blur(14px);
  }
  table.budget th, table.budget td {
    padding: 12px 18px;
    text-align: left;
    border-bottom: 1px solid var(--line);
    font-size: 14px;
  }
  table.budget th {
    background: var(--card-soft);
    font-weight: 600;
    color: var(--ink);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  table.budget td.amount { text-align: right; font-variant-numeric: tabular-nums; }
  table.budget tr:last-child td { border-bottom: none; }
  table.budget tr.total td {
    font-weight: 700;
    background: var(--card-softer);
    color: var(--ink);
  }
  .budget-note {
    margin-top: 8px;
    font-size: 12px;
    color: var(--muted);
  }

  /* Footer */
  footer {
    margin-top: 60px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }

  /* Print — force light theme for paper */
  @media print {
    :root {
      --ink: #0a2540; --ink-soft: #334e68; --muted: #6b7c93;
      --line: #e3e8ee; --bg: #ffffff; --card: #ffffff;
      --card-soft: #f0f4fa; --card-softer: #f9fbfd;
    }
    body { background: white !important; color: #0a2540 !important; font-size: 11pt; }
    .container { padding: 0; max-width: none; }
    .hero { background: white !important; color: #0a2540 !important; box-shadow: none; border-radius: 0; margin: 0 0 24px; }
    .hero-aurora, .hero-mountains, .theme-toggle { display: none !important; }
    .hero-inner { padding: 0 0 24px; }
    .hero-title, .hero-subtitle, .countdown-row, .countdown-item .value, .hero-eyebrow { color: #0a2540 !important; text-shadow: none !important; }
    .hero-eyebrow, .countdown-item .label { color: #6b7c93 !important; }
    .countdown-row { border-top: 1px solid #e3e8ee; }
    .card { break-inside: avoid; box-shadow: none; }
    section { break-inside: auto; }
    .day-row { break-inside: avoid; }
  }
</style>
</head>
<body>

<header class="hero">
  <svg class="hero-aurora" viewBox="0 0 1200 400" preserveAspectRatio="none" aria-hidden="true">
    <defs>
      <linearGradient id="auroraGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%"   style="stop-color: var(--aurora-1); stop-opacity: 0"/>
        <stop offset="30%"  style="stop-color: var(--aurora-1); stop-opacity: 0.55"/>
        <stop offset="55%"  style="stop-color: var(--aurora-2); stop-opacity: 0.55"/>
        <stop offset="80%"  style="stop-color: var(--aurora-1); stop-opacity: 0.45"/>
        <stop offset="100%" style="stop-color: var(--aurora-2); stop-opacity: 0"/>
      </linearGradient>
      <linearGradient id="auroraGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%"   style="stop-color: var(--aurora-2); stop-opacity: 0"/>
        <stop offset="50%"  style="stop-color: var(--aurora-1); stop-opacity: 0.35"/>
        <stop offset="100%" style="stop-color: var(--aurora-2); stop-opacity: 0"/>
      </linearGradient>
    </defs>
    <path fill="url(#auroraGrad)"
      d="M0,160 Q300,40 600,130 T1200,90 L1200,260 Q900,180 600,250 T0,290 Z"/>
    <path fill="url(#auroraGrad2)" opacity="0.7"
      d="M0,80 Q400,140 800,80 T1200,120 L1200,220 Q800,160 400,220 T0,180 Z"/>
  </svg>
  <svg class="hero-mountains" viewBox="0 0 1200 240" preserveAspectRatio="xMidYMax slice" aria-hidden="true">
    <!-- Far range -->
    <path style="fill: var(--mountain-far); opacity: 0.7"
      d="M0,140 L70,90 L150,130 L230,70 L320,120 L420,80 L520,130 L620,90 L740,140 L860,100 L980,140 L1080,110 L1200,150 L1200,240 L0,240 Z"/>
    <!-- Middle range -->
    <path style="fill: var(--mountain-mid); opacity: 0.92"
      d="M0,170 L60,120 L140,160 L240,95 L340,150 L460,110 L580,160 L700,115 L820,165 L940,125 L1060,170 L1200,140 L1200,240 L0,240 Z"/>
    <!-- Foreground range -->
    <path style="fill: var(--mountain-near)"
      d="M0,200 L60,150 L130,180 L220,130 L320,185 L440,140 L560,190 L680,150 L800,195 L920,155 L1040,200 L1140,170 L1200,195 L1200,240 L0,240 Z"/>
    <!-- Snow caps on near peaks -->
    <path style="fill: var(--snow-tint)"
      d="M220,130 L235,138 L255,134 L270,142 L255,148 L240,144 L225,140 Z
         M440,140 L455,148 L475,144 L495,152 L475,158 L460,154 L445,150 Z
         M680,150 L695,158 L715,154 L735,162 L715,168 L700,164 L685,160 Z
         M920,155 L935,163 L955,159 L975,167 L955,173 L940,169 L925,165 Z"/>
  </svg>

<script>
  const data = JSON.parse(document.getElementById('trip-data').textContent);

  // Format helpers
  const dateFmt = (iso) => {
    const [y, m, d] = iso.split('-').map(Number);
    const dt = new Date(Date.UTC(y, m - 1, d));
    return dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric', timeZone: 'UTC' });
  };
  const dateShort = (iso) => {
    const [y, m, d] = iso.split('-').map(Number);
    const dt = new Date(Date.UTC(y, m - 1, d));
    return {
      dow: dt.toLocaleDateString('en-US', { weekday: 'short', timeZone: 'UTC' }),
      md: dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', timeZone: 'UTC' })
    };
  };

  // Header
  document.getElementById('trip-eyebrow').textContent = data.eyebrow;
  document.getElementById('trip-title').textContent = data.title;
  document.getElementById('trip-subtitle').textContent = data.subtitle;
  document.getElementById('countdown-depart').textContent = dateFmt(data.depart);
  document.getElementById('countdown-return').textContent = dateFmt(data.return);

  const depMs = new Date(data.depart + 'T00:00:00').getTime();
  const retMs = new Date(data.return + 'T00:00:00').getTime();
  const days = Math.round((retMs - depMs) / 86400000) + 1;
  document.getElementById('countdown-length').textContent = days + ' days';

  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const daysUntil = Math.ceil((depMs - today.getTime()) / 86400000);
  document.getElementById('countdown-days').textContent =
    daysUntil > 0 ? daysUntil + ' days' : (daysUntil === 0 ? 'Today!' : 'Trip done');

  // Status pill helper
  const pill = (status) => {
    const map = {
      todo: ['pill-todo', 'To Book'],
      pending: ['pill-pending', 'Pending'],
      booked: ['pill-booked', 'Booked'],
      confirmed: ['pill-confirmed', 'Confirmed'],
      cancelled: ['pill-cancelled', 'Cancelled'],
      complete: ['pill-complete', 'Complete']
    };
    const [cls, label] = map[status] || map.todo;
    return `<span class="pill ${cls}">${label}</span>`;
  };

  // Card renderer
  const renderCard = (item) => {
    const fields = Object.entries(item.fields || {}).map(([k, v]) => {
      if (!v) return `<div><div class="field-label">${k}</div><div class="field-value empty">—</div></div>`;
      const isUrl = typeof v === 'string' && /^https?:\/\//.test(v);
      const display = isUrl ? `<a href="${v}" target="_blank" rel="noopener">${v.replace(/^https?:\/\/(www\.)?/, '').slice(0, 40)}${v.length > 47 ? '…' : ''}</a>` : v;
      return `<div><div class="field-label">${k}</div><div class="field-value">${display}</div></div>`;
    }).join('');
    const priority = item.priority ? `<div class="card-sub" style="color: var(--red); font-weight: 600;">⚑ ${item.priority}</div>` : '';
    const notes = item.notes ? `<div class="notes">${item.notes}</div>` : '';
    return `
      <div class="card">
        <div class="card-top">
          <div>
            <div class="card-name">${item.name}</div>
            ${item.subtitle ? `<div class="card-sub">${item.subtitle}</div>` : ''}
            ${priority}
          </div>
          ${pill(item.status)}
        </div>
        <div class="card-grid">${fields}</div>
        ${notes}
      </div>
    `;
  };

  // Section summary helper
  const summary = (items) => {
    const counts = items.reduce((acc, i) => { acc[i.status] = (acc[i.status] || 0) + 1; return acc; }, {});
    const parts = [];
    if (counts.confirmed) parts.push(`${counts.confirmed} confirmed`);
    if (counts.booked) parts.push(`${counts.booked} booked`);
    if (counts.todo) parts.push(`${counts.todo} to book`);
    if (counts.complete) parts.push(`${counts.complete} done`);
    return parts.join(' • ') || `${items.length} items`;
  };

  // Render flights, hotels, activities
  document.getElementById('flights-list').innerHTML = data.flights.map(renderCard).join('');
  document.getElementById('flights-summary').textContent = summary(data.flights);
  document.getElementById('hotels-list').innerHTML = data.hotels.map(renderCard).join('');
  document.getElementById('hotels-summary').textContent = summary(data.hotels);
  document.getElementById('activities-list').innerHTML = data.activities.map(renderCard).join('');
  document.getElementById('activities-summary').textContent = summary(data.activities);

  // Itinerary
  document.getElementById('itinerary-list').innerHTML = data.itinerary.map(d => {
    const ds = dateShort(d.date);
    return `<div class="day-row"><div class="day-date">${ds.md}<span class="dow">${ds.dow}</span></div><div class="day-plan">${d.plan}</div></div>`;
  }).join('');

  // ============== BUDGET ==============
  (function() {
    const money = (n) => n == null ? '—' : '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
    const items = data.budget;

    // Totals
    let bookedActual = 0, bookedEstimate = 0, unbookedEstimate = 0;
    items.forEach(i => {
      if (i.status === 'booked' && i.actual != null) {
        bookedActual += i.actual;
        bookedEstimate += i.estimate;
      } else {
        unbookedEstimate += i.estimate;
      }
    });
    const projected = bookedActual + unbookedEstimate;
    const ceiling = data.budgetCeiling;
    const headroom = ceiling - projected;
    const pctOfCeiling = Math.min(100, Math.round((projected / ceiling) * 100));
    const pctBooked = Math.min(100, Math.round((bookedActual / ceiling) * 100));

    // Summary cards
    document.getElementById('budget-summary').innerHTML = `
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 14px;">
        <div style="background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 14px 18px; box-shadow: var(--shadow); backdrop-filter: blur(14px);">
          <div style="font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 4px;">Booked (actual)</div>
          <div style="font-size: 22px; font-weight: 700; color: var(--green); font-variant-numeric: tabular-nums;">${money(bookedActual)}</div>
        </div>
        <div style="background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 14px 18px; box-shadow: var(--shadow); backdrop-filter: blur(14px);">
          <div style="font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 4px;">Estimated remaining</div>
          <div style="font-size: 22px; font-weight: 700; color: var(--amber); font-variant-numeric: tabular-nums;">${money(unbookedEstimate)}</div>
        </div>
        <div style="background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 14px 18px; box-shadow: var(--shadow); backdrop-filter: blur(14px);">
          <div style="font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 4px;">Projected total</div>
          <div style="font-size: 22px; font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums;">${money(projected)}</div>
        </div>
        <div style="background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 14px 18px; box-shadow: var(--shadow); backdrop-filter: blur(14px);">
          <div style="font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 4px;">Headroom vs $${ceiling.toLocaleString()}</div>
          <div style="font-size: 22px; font-weight: 700; color: ${headroom < 0 ? 'var(--red)' : 'var(--accent)'}; font-variant-numeric: tabular-nums;">${money(headroom)}</div>
        </div>
      </div>
      <div style="background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 14px 18px; box-shadow: var(--shadow); backdrop-filter: blur(14px);">
        <div style="display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px;">
          <span>$0</span>
          <span>Projected ${pctOfCeiling}% of ceiling</span>
          <span>$${ceiling.toLocaleString()}</span>
        </div>
        <div style="height: 14px; background: var(--card-soft); border-radius: 999px; overflow: hidden; position: relative;">
          <div style="position:absolute; left:0; top:0; bottom:0; width: ${pctBooked}%; background: var(--green);"></div>
          <div style="position:absolute; left:${pctBooked}%; top:0; bottom:0; width: ${pctOfCeiling - pctBooked}%; background: var(--amber);"></div>
        </div>
        <div style="display: flex; gap: 18px; font-size: 11px; color: var(--muted); margin-top: 8px;">
          <span><span style="display:inline-block; width:10px; height:10px; background: var(--green); border-radius: 2px; vertical-align: middle; margin-right: 4px;"></span>Booked</span>
          <span><span style="display:inline-block; width:10px; height:10px; background: var(--amber); border-radius: 2px; vertical-align: middle; margin-right: 4px;"></span>Estimated remaining</span>
          <span><span style="display:inline-block; width:10px; height:10px; background: var(--card-soft); border: 1px solid var(--line); border-radius: 2px; vertical-align: middle; margin-right: 4px;"></span>Headroom</span>
        </div>
      </div>
    `;

    // Status summary
    const bookedCount = items.filter(i => i.status === 'booked').length;
    document.getElementById('budget-status').textContent = `${bookedCount} of ${items.length} line items booked`;

    // Group by category for the detail table
    const categories = ['Air', 'Hotel', 'Transit', 'Activity', 'Food', 'Other'];
    const grouped = categories.map(cat => ({
      name: cat,
      items: items.filter(i => i.category === cat)
    })).filter(g => g.items.length > 0);

    const statusPill = (status) => {
      // Reuse the .pill-* classes so dark-mode overrides apply automatically.
      const cls = { booked: 'pill-confirmed', estimated: 'pill-todo', pending: 'pill-pending' }[status] || 'pill-todo';
      const label = { booked: 'Booked', estimated: 'Est.', pending: 'Pending' }[status] || 'Est.';
      return `<span class="pill ${cls}" style="padding: 2px 8px; font-size: 10px;">${label}</span>`;
    };

    let tableRows = '';
    grouped.forEach(g => {
      const catEstimate = g.items.reduce((s, i) => s + (i.actual != null ? i.actual : i.estimate), 0);
      tableRows += `<tr style="background: var(--card-soft);"><td colspan="3" style="font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink);">${g.name}</td><td class="amount" style="font-weight: 600;">${money(catEstimate)}</td></tr>`;
      g.items.forEach(i => {
        const display = i.actual != null ? money(i.actual) : money(i.estimate);
        const noteHtml = i.notes ? `<div style="font-size: 11px; color: var(--muted); margin-top: 2px;">${i.notes}</div>` : '';
        tableRows += `<tr><td>${i.line}${noteHtml}</td><td>${statusPill(i.status)}</td><td class="amount">${money(i.estimate)}</td><td class="amount" style="font-weight: 600;">${display}</td></tr>`;
      });
    });
    tableRows += `<tr class="total"><td>Projected total (booked + estimated remaining)</td><td></td><td></td><td class="amount">${money(projected)}</td></tr>`;
    tableRows += `<tr class="total"><td>Budget ceiling</td><td></td><td></td><td class="amount">${money(ceiling)}</td></tr>`;
    tableRows += `<tr class="total"><td>Headroom</td><td></td><td></td><td class="amount" style="color: ${headroom < 0 ? 'var(--red)' : 'var(--green)'};">${money(headroom)}</td></tr>`;

    document.getElementById('budget-table').innerHTML = `
      <thead><tr><th>Line item</th><th>Status</th><th style="text-align:right;">Estimate</th><th style="text-align:right;">Current</th></tr></thead>
      <tbody>${tableRows}</tbody>
    `;
    document.getElementById('budget-note').textContent = data.budgetNote;
  })();

  // Footer last-updated
  document.getElementById('last-updated').textContent = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

  // ============== CANCELLATION DEADLINES ==============
  (function() {
    const deadlines = (data.deadlines || []).slice().sort((a, b) => a.date.localeCompare(b.date));
    if (deadlines.length === 0) {
      document.getElementById('deadlines-list').innerHTML = '<div style="padding: 20px; color: var(--muted); text-align: center;">No reminders yet.</div>';
      return;
    }
    const todayMs = new Date(); todayMs.setHours(0, 0, 0, 0);
    let upcoming = 0, passed = 0;
    const html = deadlines.map((d, i) => {
      const [y, m, day] = d.date.split('-').map(Number);
      const ddt = new Date(Date.UTC(y, m - 1, day));
      const daysOut = Math.ceil((ddt.getTime() - todayMs.getTime()) / 86400000);
      let status, statusColor, bg;
      if (daysOut < 0) {
        status = 'PASSED'; statusColor = 'var(--muted)'; bg = 'var(--card-soft)'; passed++;
      } else if (daysOut <= 7) {
        status = `${daysOut} day${daysOut === 1 ? '' : 's'} left`; statusColor = 'var(--red)'; bg = 'rgba(192, 57, 43, 0.08)'; upcoming++;
      } else if (daysOut <= 30) {
        status = `${daysOut} days left`; statusColor = 'var(--amber)'; bg = 'rgba(217, 119, 6, 0.08)'; upcoming++;
      } else {
        status = `${daysOut} days left`; statusColor = 'var(--green)'; bg = 'var(--card)'; upcoming++;
      }
      const dateStr = ddt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric', timeZone: 'UTC' });
      const opacity = daysOut < 0 ? '0.55' : '1';
      const textDeco = daysOut < 0 ? 'line-through' : 'none';
      const border = i === deadlines.length - 1 ? '' : 'border-bottom: 1px solid var(--line);';
      return `
        <div style="display: grid; grid-template-columns: 140px 1fr 130px; gap: 16px; padding: 14px 18px; ${border} background: ${bg}; opacity: ${opacity};">
          <div style="font-weight: 600; color: var(--ink); text-decoration: ${textDeco};">${dateStr}</div>
          <div style="color: var(--ink-soft); text-decoration: ${textDeco};"><strong>${d.item}:</strong> ${d.consequence}</div>
          <div style="text-align: right; font-weight: 600; font-size: 12px; color: ${statusColor}; text-transform: uppercase; letter-spacing: 0.06em;">${status}</div>
        </div>`;
    }).join('');
    document.getElementById('deadlines-list').innerHTML = html;
    document.getElementById('deadlines-summary').textContent = `${upcoming} upcoming${passed ? ' • ' + passed + ' passed' : ''}`;
  })();

  // Map rendered as a static image — see <img src="alaska-map.jpg"> above.
</script>
</body>
</html>
